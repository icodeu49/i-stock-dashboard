name: Daily Morning News Agent

on:
  schedule:
    # Runs at 06:30 UTC every day (Adjust UTC to match your local morning time)
    - cron: '30 6 * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub UI anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-genai requests

    - name: Execute News Agent Script
      env:
        # Securely maps your GitHub Secrets to Environment Variables
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python news_agent.py
