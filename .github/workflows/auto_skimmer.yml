name: Automated Daily Watchlist Scanner

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy lxml html5lib

      - name: Execute Breakout Scanner Core
        run: python notifier.py

      - name: Commit and Push Updated Watchlist Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add watchlist.json
          git commit -m "🤖 Auto-Update: Watchlist framework synced by cloud scanner" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
