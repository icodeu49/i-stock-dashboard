name: Automated Daily Watchlist Scanner

on:
  schedule:
    - cron: '18 13,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy lxml html5lib

      - name: Execute Heatmap Skimmer Engine
        run: python heatmap_skimmer.py # ◄── 1. GRABS NEW NAMES FIRST

      - name: Execute Breakout Scanner Core
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notifier.py

      - name: Commit and Push Updated Watchlist Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Stage the modified watchlist
          git add watchlist.json
          
          # 2. Commit safely
          git commit -m "🤖 Auto-Update: Watchlist framework synced by cloud scanner" || echo "No changes to commit"
          
          # 3. THE FIX: Pull remote updates and place our changes on top
          git pull --rebase origin main
          
          # 4. Push back to the main branch seamlessly
          git push origin main
