name: Daily Institutional Stock Scan

on:
  push:
      branches:
        - main  # Triggers automatically every time you push code to the main branch
    schedule:
      # Triggers at 14:00 (3 PM UK) and 19:00 (8 PM UK) every single day
      - cron: '0 14,19 * * *'
    workflow_dispatch: # Keeps manual testing button enabled

jobs:
  scan_and_notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v6  # 👈 Upgraded to v6 for Node 24 support

    - name: Set Up Python Environment
      uses: actions/setup-python@v6  # 👈 Upgraded to v6 for Node 24 support
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Breakout Scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python notifier.py
