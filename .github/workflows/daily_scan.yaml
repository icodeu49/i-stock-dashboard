name: Daily Institutional Stock Scan

on:
  schedule:
    # Trigger automatically daily at 14:00 UTC (Which is 3:00 PM UK British Summer Time)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to manually trigger the scan from GitHub whenever you want

jobs:
  scan_and_notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Breakout Scanner
      # Inject the secure repository credentials dynamically into the runtime pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python notifier.py
